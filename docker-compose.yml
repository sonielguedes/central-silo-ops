services:
  silo-piloto:
    build: .
    container_name: silo-piloto-web
    restart: unless-stopped
    environment:
      SILO_TENANT_ID: silo-ops-001
      SILO_TENANT_STATUS: ATIVO
      NEXT_PUBLIC_SILO_TENANT_ID: silo-ops-001
      SILO_DATA_DIR: /app/data
    volumes:
      - ./data:/app/data
    ports:
      - "127.0.0.1:3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/api/health/full').then(async r => { const body = await r.json().catch(() => ({})); if (!r.ok || body.status === 'ERROR') process.exit(1); process.exit(0); }).catch(() => process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging: &default-logging
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  silo-cliente-02:
    build: .
    container_name: silo-cliente-02-web
    restart: unless-stopped
    environment:
      SILO_TENANT_ID: cliente-02
      SILO_TENANT_STATUS: ATIVO
      NEXT_PUBLIC_SILO_TENANT_ID: cliente-02
      SILO_DATA_DIR: /app/data
    volumes:
      - ./data:/app/data
    expose:
      - "3000"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/api/health/full').then(async r => { const body = await r.json().catch(() => ({})); if (!r.ok || body.status === 'ERROR') process.exit(1); process.exit(0); }).catch(() => process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging: *default-logging

  silo-cliente-03:
    build: .
    container_name: silo-cliente-03-web
    restart: unless-stopped
    environment:
      SILO_TENANT_ID: cliente-03
      SILO_TENANT_STATUS: ATIVO
      NEXT_PUBLIC_SILO_TENANT_ID: cliente-03
      SILO_DATA_DIR: /app/data
    volumes:
      - ./data:/app/data
    expose:
      - "3000"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/api/health/full').then(async r => { const body = await r.json().catch(() => ({})); if (!r.ok || body.status === 'ERROR') process.exit(1); process.exit(0); }).catch(() => process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging: *default-logging

  nginx:
    image: nginx:1.27-alpine
    container_name: silo-nginx
    restart: unless-stopped
    depends_on:
      - silo-piloto
      - silo-cliente-02
      - silo-cliente-03
    ports:
      - "3001:3001"
      - "3002:3002"
      - "3003:3003"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "body=$(wget -qO- http://127.0.0.1:3001/api/health/full) || exit 1; echo \"$body\" | grep -q '\"status\":\"ERROR\"' && exit 1; exit 0"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging: *default-logging
