worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # Oculta versão do nginx (security + Lighthouse best-practice)
    server_tokens off;

    # Garante charset=utf-8 em todas as respostas de texto (Lighthouse + RFC 2616)
    charset utf-8;
    charset_types text/html text/css text/plain application/json application/javascript text/xml application/xml;

    client_max_body_size 10m;
    proxy_connect_timeout 5s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    # Remove X-Powered-By vindo do upstream Next.js (caso poweredByHeader ainda vaze)
    proxy_hide_header X-Powered-By;

    # Security headers globais
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), camera=(), microphone=()" always;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;

    upstream silo_piloto {
        server silo-piloto:3000;
    }

    upstream silo_cliente_02 {
        server silo-cliente-02:3000;
    }

    upstream silo_cliente_03 {
        server silo-cliente-03:3000;
    }

    # Bloco de location reutilizável para assets estáticos do Next.js
    # Cache imutável de 1 ano — os hashes no filename garantem cache-busting
    map $uri $static_cache {
        ~^/_next/static/ "public, max-age=31536000, immutable";
        default          "";
    }

    server {
        listen 3001;
        server_name _;

        # Assets estáticos: cache imutável de longo prazo
        location /_next/static/ {
            proxy_pass http://silo_piloto;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Silo-Tenant silo-ops-001;
            add_header Cache-Control "public, max-age=31536000, immutable" always;
            add_header X-Frame-Options "SAMEORIGIN" always;
            add_header X-Content-Type-Options "nosniff" always;
        }

        location / {
            proxy_pass http://silo_piloto;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port 3001;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Silo-Tenant silo-ops-001;
        }
    }

    server {
        listen 3002;
        server_name _;

        location /_next/static/ {
            proxy_pass http://silo_cliente_02;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Silo-Tenant cliente-02;
            add_header Cache-Control "public, max-age=31536000, immutable" always;
            add_header X-Frame-Options "SAMEORIGIN" always;
            add_header X-Content-Type-Options "nosniff" always;
        }

        location / {
            proxy_pass http://silo_cliente_02;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Silo-Tenant cliente-02;
        }
    }

    server {
        listen 3003;
        server_name _;

        location /_next/static/ {
            proxy_pass http://silo_cliente_03;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Silo-Tenant cliente-03;
            add_header Cache-Control "public, max-age=31536000, immutable" always;
            add_header X-Frame-Options "SAMEORIGIN" always;
            add_header X-Content-Type-Options "nosniff" always;
        }

        location / {
            proxy_pass http://silo_cliente_03;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Silo-Tenant cliente-03;
        }
    }
}
